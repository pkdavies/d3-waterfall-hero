<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>d3-waterfall – original library demo</title>
  <script src="https://d3js.org/d3.v4.min.js"></script>
  <script src="../src/waterfall.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!--
    This demo requires a data.csv generated by rtl_power and (optionally) a
    frequencies.json generated by src/sigid_csv_to_json.py.
    See the README for instructions on generating these files.

    Example command (2.4 GHz band, 1 hour capture):
      rtl_power -f 2400M:2485M:1M -i 10 -g 50 -e 1h data.csv
  -->
  <a href="#" onclick="this.href = w.canvas.node().toDataURL('image/png');" download="waterfall.png">
    Download PNG
  </a>
  <div id="waterfall"></div>
  <script>
    var w = new Waterfall("#waterfall", "data.csv", "frequencies.json", true, true, true);
    getData(w, initDisplay);
  </script>
</body>
</html>
