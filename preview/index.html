<!DOCTYPE html>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="hero">

      <div id="timestamp">
        <div id="ts-time"></div>

      </div>

      <div id="text-block">
        <div id="overline">R&amp;D for critical missions</div>
        <h1>Frontier cyber and electromagnetic</h1>
        <p id="body-text">
          Develop deployable AI, RF and cyber technologies that help critical
          organisations detect hidden threats, understand complex environments
          and act with confidence.
        </p>
        <div id="ctas">
          <button class="btn-primary">Explore Our Technology</button>
          <button class="btn-secondary">Talk to Our Team</button>
        </div>
      </div>
    </div>

</html>
